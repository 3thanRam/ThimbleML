name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install numpy matplotlib pytest

      - name: Run unit tests
        run: pytest -q

      - name: Validate locked ablation orchestration
        run: |
          python scripts/run_locked_ablation.py --dry-run --device cpu > /tmp/locked-commands.txt
          test "$(grep -c 'main.py' /tmp/locked-commands.txt)" -eq 9
          grep -q -- '--scale-factor 0.0.*--no-triangular-linear' /tmp/locked-commands.txt
          grep -q -- '--scale-factor 0.01.*--no-triangular-linear' /tmp/locked-commands.txt
          grep -q -- '--scale-factor 0.01' /tmp/locked-commands.txt
          python scripts/summarize_ablation.py \
            --run-root /tmp/missing-locked-runs \
            --results-dir /tmp/locked-report \
            --architectures additive \
            --seeds 7
          test -f /tmp/locked-report/ablation_runs.csv
          test -f /tmp/locked-report/ablation_summary.csv
          test -f /tmp/locked-report/ablation_report.md

      - name: Run finite non-collapsed training smoke test
        run: |
          python main.py \
            --steps 40 \
            --batch-size 32 \
            --train-samples 512 \
            --valid-samples 128 \
            --grid-points 21 \
            --valid-batches 1 \
            --device cpu \
            --run-dir /tmp/thimble-smoke
          test -f /tmp/thimble-smoke/config.json
          test -f /tmp/thimble-smoke/metrics.csv
          test -f /tmp/thimble-smoke/model_best.pt
          test -f /tmp/thimble-smoke/model_last.pt
          test -f /tmp/thimble-smoke/status.json
          if grep -Eiq '(^|,)(nan|inf|-inf)(,|$)' /tmp/thimble-smoke/metrics.csv; then
            echo "Non-finite metric found in smoke run"
            exit 1
          fi
          python - <<'PY'
          import csv
          import json
          from pathlib import Path

          run_dir = Path('/tmp/thimble-smoke')
          rows = list(csv.DictReader((run_dir / 'metrics.csv').open()))
          assert rows, 'Smoke run produced no metrics rows'
          assert all(int(row['validation_collapsed']) == 0 for row in rows)
          status = json.loads((run_dir / 'status.json').read_text())
          assert status['status'] == 'completed'
          PY
